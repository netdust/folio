<!doctype html>
<html lang="en" class="folio">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e0d0c" />
    <title>Folio</title>
    <script>
      // First-paint theme bootstrap. Reads folio:theme from localStorage and applies
      // .dark to <html> before React mounts, preventing the light-flash on dark theme.
      (function () {
        try {
          var s = localStorage.getItem('folio:theme');
          var resolved =
            s === 'light' ? 'light'
            : s === 'dark' ? 'dark'
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          if (resolved === 'dark') document.documentElement.classList.add('dark');
        } catch (e) { /* localStorage unavailable; default light */ }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
